  raw_view_name: raw_tushare_daily
  description: 获取股票行情数据，或通过[**通用行情接口**]( https://tushare.pro/document/2?doc_id=109)获取数据，包含了前后复权数据
  field_descriptions:
    ts_code: 股票代码
    trade_date: 交易日期
    open: 开盘价
    high: 最高价
    low: 最低价
    close: 收盘价
    pre_close: 昨收价【除权价】
    change: 涨跌额
    pct_chg: 涨跌幅（%） 【基于除权后的昨收计算的涨跌幅：（今收-除权昨收）/除权昨收 】
    vol: 成交量 （手）
    amount: 成交额 （千元）
  call_limit:
    status: DOCUMENTED
    raw: 调取说明：基础积分每分钟内可调取500次，每次6000条数据，一次请求相当于提取一个股票23年历史
