name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  UV_NO_PROGRESS: "1"

jobs:
  quality:
    name: Core / lint and type check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src

  tests:
    name: Core / unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Run pytest
        run: uv run pytest

  package:
    name: Core / build and CLI smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build

      - name: Smoke-test the built wheel
        run: uv run --isolated --no-project --with dist/*.whl qmt-agent --help

  windows-gateway:
    name: Windows gateway / lint, type check, build
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: gateway/windows_qmt_gateway

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          enable-cache: true
          working-directory: gateway/windows_qmt_gateway

      - name: Sync locked gateway dependencies
        run: uv sync --locked

      - name: Run gateway Ruff checks
        run: uv run ruff check src

      - name: Run gateway mypy checks
        run: uv run mypy src

      - name: Build gateway package
        run: uv build

      - name: Smoke-test gateway CLI
        run: uv run qmt-gateway --help
